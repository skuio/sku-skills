name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate skills
        run: npm run validate
      - name: Build all targets
        run: npm run build
      - name: Verify committed dist/ and README table are up to date
        run: |
          if ! git diff --quiet -- dist README.md; then
            echo "::error::dist/ or the README skills table is stale — run 'npm run build' and commit the refreshed files."
            git --no-pager diff --stat -- dist README.md
            exit 1
          fi
