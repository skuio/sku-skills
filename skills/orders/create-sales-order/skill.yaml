name: create-sales-order
title: Create a Sales Order
domain: orders
version: 1.0.0
description: >-
  Create a new sales order in SKU.io with one or more line items. Use this to place an order for
  a customer — capturing the order status, order date, optional customer and store, and the SKUs,
  quantities, and unit prices being sold. Resolve products first with find-product so each line
  references a real product.
tags: [orders, sales-order, create, checkout, fulfilment]
maintainers: [kmizzi]
auth:
  scopes: [orders:write, products:read]
api:
  base_url: https://{tenant}.sku.io
  operations:
    - id: create-sales-order
      method: POST
      path: /api/sales-orders
      summary: Create a sales order with header fields and an array of line items.
      parameters:
        - name: order_status
          in: body
          type: string
          required: true
          description: >-
            Order status. Use "draft" for an unconfirmed order (lines optional); any other status
            requires at least one line. Common values include draft, open/confirmed.
          example: draft
        - name: order_date
          in: body
          type: string
          required: true
          description: Order date (ISO-8601). Defaults to now if omitted by the client.
          example: "2026-07-09"
        - name: customer_id
          in: body
          type: integer
          required: false
          description: Existing customer id to attach the order to.
        - name: store_id
          in: body
          type: integer
          required: false
          description: Store/sales-channel id the order belongs to.
        - name: customer_po_number
          in: body
          type: string
          required: false
          description: The customer's purchase-order reference.
        - name: sales_order_lines
          in: body
          type: array
          required: false
          description: >-
            Array of line items. Required unless order_status is "draft". Each line:
            { description (required), quantity (required), amount (required unit price),
            product_id or sku (to link a catalog product), warehouse_id (optional) }.
