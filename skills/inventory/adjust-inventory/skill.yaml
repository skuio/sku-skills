name: adjust-inventory
title: Adjust Inventory
domain: inventory
version: 1.0.0
description: >-
  Adjust the on-hand quantity of a product at a warehouse in SKU.io — an increase, a decrease, or
  a set-to-value. Use this for stock takes, corrections, damage/shrinkage write-offs, or found
  stock. Resolve the product with find-product first so the adjustment targets the right product
  and warehouse.
tagline: Increase / decrease / set on-hand stock at a warehouse
tags: [inventory, stock, adjustment, stock-take, shrinkage]
maintainers: [kmizzi]
auth:
  scopes: [inventory:write, products:read]
api:
  base_url: https://{tenant}.sku.io
  operations:
    - id: create-inventory-adjustment
      method: POST
      path: /api/inventory-adjustments
      summary: Create an inventory adjustment (increase, decrease, or set) for a product at a warehouse.
      parameters:
        - name: adjustment_date
          in: body
          type: string
          required: true
          description: Date of the adjustment (ISO-8601).
          example: "2026-07-09"
        - name: product_id
          in: body
          type: integer
          required: true
          description: The product being adjusted (from find-product).
        - name: warehouse_id
          in: body
          type: integer
          required: true
          description: The warehouse whose on-hand quantity is adjusted.
        - name: quantity
          in: body
          type: number
          required: true
          description: >-
            The magnitude of the adjustment (for increase/decrease) or the target on-hand value
            (for set). Must be non-zero and < 1,000,000.
          example: 25
        - name: adjustment_type
          in: body
          type: string
          required: true
          description: One of "increase", "decrease", or "set". Defaults to "increase".
          example: increase
        - name: unit_cost
          in: body
          type: number
          required: false
          description: >-
            Unit cost of the added stock. Required for an "increase" when the product has no
            existing average cost; ignored for decreases.
        - name: warehouse_location_id
          in: body
          type: integer
          required: false
          description: Specific bin/location within the warehouse.
        - name: notes
          in: body
          type: string
          required: false
          description: Free-text reason for the adjustment (recommended for audit).
