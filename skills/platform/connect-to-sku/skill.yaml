name: connect-to-sku
title: Connect to SKU.io
domain: platform
version: 1.1.0
description: >-
  The entry point for any SKU.io task. First establish which tenant you are working in
  (`https://{tenant}.sku.io`) — ask for it if it was not given — then authenticate with a Personal
  Access Token sent as a Bearer token and verify it with a cheap identity call. Use this first
  whenever you are about to call the SKU.io API.
tagline: Establish the tenant, authenticate, and verify the token before anything else
tags: [auth, setup, getting-started, personal-access-token]
maintainers: [kmizzi]
auth:
  scopes: [settings:read]
api:
  base_url: https://{tenant}.sku.io
  operations:
    - id: get-me
      method: GET
      path: /api/me
      summary: >-
        Return the authenticated user and the tenant the token resolved to (tenant_id /
        tenant_name). Cheapest way to verify a token works and that you are on the right tenant.
