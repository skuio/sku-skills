name: edit-packing-slip-template
title: Edit a Packing-Slip PDF Template
domain: settings
version: 1.0.0
description: >-
  Edit a SKU.io packing-slip PDF template with the packing-specific rules that keep the footer
  banner, logo, and per-store layouts consistent. Use this when changing a packing slip's footer
  banner or branding, or when the banner renders inconsistently — present on some orders or stores,
  missing or clipped on others. Enforces the exact footer-banner structure the PDF export requires
  to pin a banner to every page, the banner aspect ratio, cross-store consistency, and a multi-order
  visual QA pass against real orders. Extends edit-pdf-template — do the base edit/validate/save loop
  there; this adds the packing rules.
tagline: Edit packing-slip templates without breaking the footer banner
tags: [pdf-templates, packing-slip, footer-banner, warehouse, branding, documents, settings]
maintainers: [kmizzi]
pages:
  - /settings/pdf-templates/packing
auth:
  scopes: [settings:read, settings:write]
api:
  base_url: https://{tenant}.sku.io
  operations:
    - id: list-pdf-templates
      method: GET
      path: /api/pdf-templates
      summary: >-
        List all templates; filter client-side to type=packing to find the global packing template
        and its per-store overrides (store_id != null).
    - id: list-store-overrides
      method: GET
      path: /api/pdf-templates/{type}/store-overrides
      summary: List every per-store packing override so you can audit them for consistency.
      parameters:
        - name: type
          in: path
          type: string
          required: true
          description: Use "packing".
          example: packing
    - id: get-pdf-template
      method: GET
      path: /api/pdf-templates/{id}
      summary: Get a packing template's content, updated_at (optimistic lock), store_id, and schema.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: PdfTemplate id.
    - id: upload-pdf-template-asset
      method: POST
      path: /api/pdf-template-assets
      summary: >-
        Upload the footer-banner image (multipart field `image`). Returns slug + {{{asset.<slug>}}}
        token and the image width/height. Prefer PNG/JPG; keep the banner ~6.94:1 (e.g. 1734x250).
      parameters:
        - name: image
          in: body
          type: string
          required: true
          description: "Image file (multipart/form-data). mimes: jpg,jpeg,png,gif,webp; max 5 MB."
        - name: name
          in: body
          type: string
          required: false
          description: Display name; slug is derived from it.
    - id: validate-pdf-template
      method: POST
      path: /api/pdf-templates/{id}/validate
      summary: Validate draft content ({ ok, errors, warnings }) before rendering.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: PdfTemplate id.
        - name: content
          in: body
          type: string
          required: true
          description: Draft HTML to validate.
    - id: search-sales-orders
      method: GET
      path: /api/pdf-templates/search-sales-orders
      summary: >-
        Find real orders (max 20, newest first) for the QA matrix. Filter by store_id to get one
        order per store for cross-store checks.
      parameters:
        - name: search
          in: query
          type: string
          required: false
          description: Match on sales order number.
        - name: store_id
          in: query
          type: integer
          required: false
          description: Restrict to one store.
    - id: preview-pdf-template
      method: POST
      path: /api/pdf-templates/{id}/preview
      summary: >-
        Render draft packing content to a base64 PDF. Pass sales_order_id to render against a real
        order (honoured for packing). Always QA format=pdf (the real export), not just format=html.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: PdfTemplate id.
        - name: content
          in: body
          type: string
          required: true
          description: Draft HTML to render.
        - name: sales_order_id
          in: body
          type: integer
          required: false
          description: Real order to render against (packing type honours this).
        - name: format
          in: body
          type: string
          required: false
          description: pdf (default; the real export engine) or html (sanity check only).
          example: pdf
    - id: preview-with-sales-order
      method: POST
      path: /api/pdf-templates/preview-sales-order
      summary: Render the store's effective SAVED packing template against a real order (base64 PDF).
      parameters:
        - name: sales_order_id
          in: body
          type: integer
          required: true
          description: The sales order id.
    - id: update-pdf-template
      method: PUT
      path: /api/pdf-templates/{id}
      summary: Save new packing content. Round-trip updated_at. Snapshots a restorable version.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: PdfTemplate id.
        - name: content
          in: body
          type: string
          required: true
          description: New HTML template source.
        - name: updated_at
          in: body
          type: string
          required: false
          description: Optimistic-lock token from get-pdf-template.
    - id: restore-pdf-template-version
      method: POST
      path: /api/pdf-templates/{id}/versions/{versionId}/restore
      summary: Roll the packing template back to a prior version if an edit ships wrong.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: PdfTemplate id.
        - name: versionId
          in: path
          type: integer
          required: true
          description: Version id to restore.
    - id: create-store-override
      method: POST
      path: /api/pdf-templates/{id}/store-override
      summary: Clone the global packing template into a store-specific override to edit separately.
      parameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Global packing template id.
        - name: store_id
          in: body
          type: integer
          required: true
          description: Store the override is for.
